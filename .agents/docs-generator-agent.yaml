name: Documentation Generator Agent
description: >
  Autonomiczny agent generujący dokumentację dla projektu Mailer.
  Analizuje kod, testy i commit messages, generując zawartość do dokumentacji.

model: claude-3-5-sonnet

purpose: |
  Agent skanuje repozytorium i generuje:
  - API documentation
  - Installation guides
  - Usage examples
  - Testing guidelines

capabilities:
  - code-analysis
  - documentation-generation
  - example-creation
  - test-analysis

activation:
  trigger: "Generate documentation for [module]"
  keywords:
    - "generate docs"
    - "create documentation"
    - "document this"

workflow:
  - analyze: "Zbierz informacje o modulach, funkcjach, klasach"
  - refactor: "Przygotuj strukturę dokumentacji"
  - test: "Sprawdź poprawność contentu i przykładów"
  - document: "Wygeneruj Markdown i przykłady"

restrictions:
  - noBreakingChanges: true
  - maintainBackwardCompat: true

tools:
  - fileRead
  - fileWrite
  - codeAnalysis
  - gitLog
  - runTests

memory:
  - projectStructure
  - apiSignatures
  - examples
  - standards

output:
  format: markdown
  location: docs/
  structure:
    - overview
    - installation
    - quickstart
    - api-reference
    - examples
    - troubleshooting
